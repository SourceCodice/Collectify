name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build Collectify.sln --configuration Release

  frontend:
    name: Frontend
    runs-on: windows-latest

    defaults:
      run:
        working-directory: src/frontend/collectify-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/collectify-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
